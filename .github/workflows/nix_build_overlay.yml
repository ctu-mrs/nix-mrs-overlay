name: nix_build_overlay

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CACHIX_AUTH_TOKEN: ${{secrets.CACHIX}}
  PUSH_TOKEN: ${{secrets.PUSH_TOKEN}}

jobs:

  # ==========================================
  # 1. PREPARE: Generate files and artifact them
  # ==========================================
  generate_files:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'
          token: ${{ secrets.PUSH_TOKEN }}

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false

      - name: Generate deps.json
        run: |
          git clone https://github.com/ctu-mrs/buildfarm2 /tmp/buildfarm2
          /tmp/buildfarm2/scripts/clone_nixed_packages.sh mrs unstable
          /tmp/buildfarm2/scripts/clone_nixed_packages.sh thirdparty unstable
          /tmp/buildfarm2/scripts/clone_nixed_packages.sh nonbloom unstable
          /tmp/buildfarm2/scripts/extract_deps_json.py /tmp/workspace ./deps.json

      # Upload the raw files so the downstream VMs can grab them
      - name: Upload Workspace Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workspace-files
          path: |
            deps.json
            flake.lock
          retention-days: 1
          overwrite: true

  # ==========================================
  # 2. BUILD: Matrix compilation across architectures
  # ==========================================
  build_overlay:
    needs: generate_files
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-latest
            system: aarch64-darwin

    runs-on: ${{ matrix.os }}
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'
          token: ${{ secrets.PUSH_TOKEN }}

      # Drop the newly generated files into the clean checkout
      - name: Download Workspace Artifacts
        uses: actions/download-artifact@v4
        with:
          name: workspace-files
          path: .

      # Nix Flakes require files to be tracked/committed in git. 
      # Since this is an isolated VM, we apply the commit locally BEFORE building!
      - name: Locally Commit Files for Nix Flakes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "ctu-mrs@github.com"
          git add deps.json flake.lock
          git commit -m "automatic update [skip actions]" || echo "nothing to commit"

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - uses: cachix/cachix-action@v15
        with:
          name: ctu-mrs
          authToken: '${{ secrets.CACHIX }}'
          extraPullNames: ros

      - name: Nix Build
        run: ./safe_build.sh .#packages.${{ matrix.system }}.all --refresh --accept-flake-config --impure

      - name: Push to Cachix
        if: always()
        run: nix run nixpkgs#cachix -- push ctu-mrs ./result


  # ==========================================
  # 3. PUBLISH: Commit and push ONLY if matrix passes
  # ==========================================
  push_updates:
    needs: build_overlay
    runs-on: ubuntu-24.04
    permissions:
      contents: "write"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Download Workspace Artifacts
        uses: actions/download-artifact@v4
        with:
          name: workspace-files
          path: .

      # Re-apply the exact same local commit from the artifacts, but this time PUSH it!
      - name: Commit and Push Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "ctu-mrs@github.com"
          git add deps.json flake.lock
          git commit -m "automatic update [skip actions]" || echo "nothing to commit"
          git push
